<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ファビコン最終候補 - #33+#96ミックス+フォントバリエーション</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:wght@700&family=Crimson+Text:wght@700&family=Lora:wght@700&family=Merriweather:wght@900&family=DM+Serif+Display&family=Libre+Baskerville:wght@700&family=Source+Serif+4:wght@700;900&family=Noto+Serif+JP:wght@700;900&family=Josefin+Sans:wght@700&family=Montserrat:wght@800;900&family=Raleway:wght@800;900&family=Poppins:wght@800;900&family=Inter:wght@800;900&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
<style>
body { background: #1a1a1a; color: #fff; font-family: sans-serif; padding: 20px; }
h1 { text-align: center; margin-bottom: 10px; }
p.sub { text-align: center; color: #888; margin-bottom: 30px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 16px; }
.item { text-align: center; background: #2a2a2a; border-radius: 12px; padding: 16px 8px; cursor: pointer; transition: transform 0.15s; }
.item:hover { transform: scale(1.15); background: #3a3a3a; }
.item .fav { width: 64px; height: 64px; border-radius: 8px; margin: 0 auto; display: flex; align-items: center; justify-content: center; flex-direction: column; position: relative; overflow: hidden; }
.item p { font-size: 10px; color: #aaa; margin-top: 6px; }
.item .font-name { font-size: 9px; color: #666; }
h2 { margin-top: 36px; margin-bottom: 14px; color: #c8a84b; border-bottom: 1px solid #333; padding-bottom: 8px; }
.preview { position: fixed; top: 20px; right: 20px; background: #333; padding: 24px; border-radius: 16px; display: none; z-index: 100; min-width: 220px; }
.preview .big { width: 128px; height: 128px; border-radius: 16px; margin: 0 auto; display: flex; align-items: center; justify-content: center; flex-direction: column; position: relative; overflow: hidden; }
.preview .sizes { display: flex; gap: 16px; align-items: end; margin-top: 16px; justify-content: center; }
.preview .sizes .sz { border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-direction: column; position: relative; overflow: hidden; }
.preview .tab { margin-top: 12px; background: #555; border-radius: 8px 8px 0 0; padding: 6px 12px; display: flex; align-items: center; gap: 8px; font-size: 12px; }
.preview .tab .sz { width: 16px; height: 16px; border-radius: 3px; }
.preview .white-tab { margin-top: 4px; background: #f5f5f5; border-radius: 0 0 8px 8px; padding: 6px 12px; display: flex; align-items: center; gap: 8px; font-size: 12px; color: #333; }
.preview .white-tab .sz { width: 16px; height: 16px; border-radius: 3px; }
</style>
</head>
<body>
<h1>最終候補 — #33×#96ミックス+フォント</h1>
<p class="sub">屋根ライン + H/HT + ゴールドバー + 各種フォント</p>

<div id="preview" class="preview">
  <div id="pbig"></div>
  <div class="sizes" id="psz"></div>
  <div class="tab" id="ptab"></div>
  <div class="white-tab" id="pwtab"></div>
  <p id="pn" style="text-align:center;margin-top:8px;color:#aaa;"></p>
</div>
<div id="cat"></div>

<script>
const designs = [

// ===== セクション1: H + 屋根 + バー ミックス (1-15) =====
// 各種フォント × ミックスデザイン
{id:1, font:'Arial', w:900, letter:'H', desc:'Arial Black', type:'mix'},
{id:2, font:'Playfair Display', w:900, letter:'H', desc:'Playfair Display', type:'mix'},
{id:3, font:'Cormorant Garamond', w:700, letter:'H', desc:'Cormorant', type:'mix'},
{id:4, font:'Crimson Text', w:700, letter:'H', desc:'Crimson Text', type:'mix'},
{id:5, font:'Lora', w:700, letter:'H', desc:'Lora', type:'mix'},
{id:6, font:'Merriweather', w:900, letter:'H', desc:'Merriweather', type:'mix'},
{id:7, font:'DM Serif Display', w:400, letter:'H', desc:'DM Serif', type:'mix'},
{id:8, font:'Libre Baskerville', w:700, letter:'H', desc:'Libre Baskerville', type:'mix'},
{id:9, font:'Source Serif 4', w:900, letter:'H', desc:'Source Serif', type:'mix'},
{id:10, font:'Noto Serif JP', w:900, letter:'H', desc:'Noto Serif JP', type:'mix'},
{id:11, font:'Josefin Sans', w:700, letter:'H', desc:'Josefin Sans', type:'mix'},
{id:12, font:'Montserrat', w:900, letter:'H', desc:'Montserrat', type:'mix'},
{id:13, font:'Raleway', w:900, letter:'H', desc:'Raleway', type:'mix'},
{id:14, font:'Poppins', w:900, letter:'H', desc:'Poppins', type:'mix'},
{id:15, font:'Inter', w:900, letter:'H', desc:'Inter', type:'mix'},

// ===== セクション2: HT + 屋根 + バー (16-30) =====
{id:16, font:'Arial', w:900, letter:'HT', desc:'Arial Black', type:'mix-ht'},
{id:17, font:'Playfair Display', w:900, letter:'HT', desc:'Playfair Display', type:'mix-ht'},
{id:18, font:'Cormorant Garamond', w:700, letter:'HT', desc:'Cormorant', type:'mix-ht'},
{id:19, font:'DM Serif Display', w:400, letter:'HT', desc:'DM Serif', type:'mix-ht'},
{id:20, font:'Lora', w:700, letter:'HT', desc:'Lora', type:'mix-ht'},
{id:21, font:'Merriweather', w:900, letter:'HT', desc:'Merriweather', type:'mix-ht'},
{id:22, font:'Source Serif 4', w:900, letter:'HT', desc:'Source Serif', type:'mix-ht'},
{id:23, font:'Montserrat', w:900, letter:'HT', desc:'Montserrat', type:'mix-ht'},
{id:24, font:'Poppins', w:900, letter:'HT', desc:'Poppins', type:'mix-ht'},
{id:25, font:'Inter', w:900, letter:'HT', desc:'Inter', type:'mix-ht'},
{id:26, font:'Raleway', w:900, letter:'HT', desc:'Raleway', type:'mix-ht'},
{id:27, font:'Outfit', w:800, letter:'HT', desc:'Outfit', type:'mix-ht'},
{id:28, font:'Noto Serif JP', w:900, letter:'HT', desc:'Noto Serif JP', type:'mix-ht'},
{id:29, font:'Libre Baskerville', w:700, letter:'HT', desc:'Libre Baskerville', type:'mix-ht'},
{id:30, font:'Crimson Text', w:700, letter:'HT', desc:'Crimson Text', type:'mix-ht'},

// ===== セクション3: 屋根なし H+バーのみ フォント違い (31-42) =====
{id:31, font:'Playfair Display', w:900, letter:'H', desc:'Playfair', type:'bar'},
{id:32, font:'DM Serif Display', w:400, letter:'H', desc:'DM Serif', type:'bar'},
{id:33, font:'Cormorant Garamond', w:700, letter:'H', desc:'Cormorant', type:'bar'},
{id:34, font:'Lora', w:700, letter:'H', desc:'Lora', type:'bar'},
{id:35, font:'Source Serif 4', w:900, letter:'H', desc:'Source Serif', type:'bar'},
{id:36, font:'Montserrat', w:900, letter:'H', desc:'Montserrat', type:'bar'},
{id:37, font:'Raleway', w:900, letter:'H', desc:'Raleway', type:'bar'},
{id:38, font:'Poppins', w:900, letter:'H', desc:'Poppins', type:'bar'},
{id:39, font:'Inter', w:900, letter:'H', desc:'Inter', type:'bar'},
{id:40, font:'Outfit', w:800, letter:'H', desc:'Outfit', type:'bar'},
{id:41, font:'Noto Serif JP', w:900, letter:'H', desc:'Noto Serif', type:'bar'},
{id:42, font:'Merriweather', w:900, letter:'H', desc:'Merriweather', type:'bar'},

// ===== セクション4: 屋根のみ（バーなし）H フォント違い (43-50) =====
{id:43, font:'Playfair Display', w:900, letter:'H', desc:'Playfair', type:'roof'},
{id:44, font:'DM Serif Display', w:400, letter:'H', desc:'DM Serif', type:'roof'},
{id:45, font:'Cormorant Garamond', w:700, letter:'H', desc:'Cormorant', type:'roof'},
{id:46, font:'Montserrat', w:900, letter:'H', desc:'Montserrat', type:'roof'},
{id:47, font:'Inter', w:900, letter:'H', desc:'Inter', type:'roof'},
{id:48, font:'Poppins', w:900, letter:'H', desc:'Poppins', type:'roof'},
{id:49, font:'Outfit', w:800, letter:'H', desc:'Outfit', type:'roof'},
{id:50, font:'Source Serif 4', w:900, letter:'H', desc:'Source Serif', type:'roof'},
];

function renderFav(d, size) {
  const s = size;
  const el = document.createElement('div');
  el.style.cssText = `width:${s}px;height:${s}px;border-radius:${s*0.19}px;background:linear-gradient(135deg,#0d3320,#2d8a5e);display:flex;align-items:center;justify-content:center;flex-direction:column;position:relative;overflow:hidden;`;

  let html = '';
  const fs = d.letter.length > 1 ? s*0.38 : s*0.56;

  if (d.type === 'mix' || d.type === 'mix-ht') {
    // 屋根ライン
    html += `<svg viewBox="0 0 ${s} ${s}" style="position:absolute;top:0;left:0;width:100%;height:100%"><path d="M${s*0.15} ${s*0.38}L${s*0.5} ${s*0.1} ${s*0.85} ${s*0.38}" fill="none" stroke="#c8a84b" stroke-width="${s*0.05}" opacity="0.6" stroke-linecap="round"/></svg>`;
    // 文字
    html += `<span style="font-family:'${d.font}',serif;font-weight:${d.w};font-size:${fs}px;color:#fff;position:relative;z-index:1;margin-top:${s*0.12}px;line-height:1;letter-spacing:${d.letter.length>1?'-1px':'0'}">${d.letter}</span>`;
    // ゴールドバー
    html += `<div style="width:${s*0.5}px;height:${s*0.07}px;background:#c8a84b;border-radius:${s*0.04}px;margin-top:${s*0.02}px;position:relative;z-index:1;"></div>`;
  } else if (d.type === 'bar') {
    html += `<span style="font-family:'${d.font}',serif;font-weight:${d.w};font-size:${s*0.56}px;color:#fff;line-height:1;margin-top:${s*0.03}px">${d.letter}</span>`;
    html += `<div style="width:${s*0.56}px;height:${s*0.07}px;background:#c8a84b;border-radius:${s*0.04}px;margin-top:${s*0.03}px;"></div>`;
  } else if (d.type === 'roof') {
    html += `<svg viewBox="0 0 ${s} ${s}" style="position:absolute;top:0;left:0;width:100%;height:100%"><path d="M${s*0.12} ${s*0.35}L${s*0.5} ${s*0.08} ${s*0.88} ${s*0.35}" fill="none" stroke="#c8a84b" stroke-width="${s*0.05}" opacity="0.6" stroke-linecap="round"/></svg>`;
    html += `<span style="font-family:'${d.font}',serif;font-weight:${d.w};font-size:${s*0.5}px;color:#fff;position:relative;z-index:1;margin-top:${s*0.15}px;line-height:1">${d.letter}</span>`;
  }

  el.innerHTML = html;
  return el;
}

const sections = [
  { name: '🏠 H + 屋根 + ゴールドバー ミックス (1-15)', start: 0, end: 15 },
  { name: '🏠 HT + 屋根 + ゴールドバー (16-30)', start: 15, end: 30 },
  { name: '━ H + ゴールドバーのみ (31-42)', start: 30, end: 42 },
  { name: '⌂ H + 屋根のみ (43-50)', start: 42, end: 50 },
];

const cat = document.getElementById('cat');
sections.forEach(sec => {
  const h = document.createElement('h2');
  h.textContent = sec.name;
  cat.appendChild(h);
  const grid = document.createElement('div');
  grid.className = 'grid';
  for (let i = sec.start; i < sec.end && i < designs.length; i++) {
    const d = designs[i];
    const item = document.createElement('div');
    item.className = 'item';
    const fav = renderFav(d, 64);
    item.appendChild(fav);
    const p = document.createElement('p');
    p.textContent = `#${d.id}`;
    item.appendChild(p);
    const fn = document.createElement('span');
    fn.className = 'font-name';
    fn.textContent = d.desc;
    item.appendChild(fn);

    item.onclick = () => {
      const pv = document.getElementById('preview');
      pv.style.display = 'block';

      const big = document.getElementById('pbig');
      big.innerHTML = '';
      big.appendChild(renderFav(d, 128));

      const sz = document.getElementById('psz');
      sz.innerHTML = '';
      [16, 24, 32, 48].forEach(s => {
        const f = renderFav(d, s);
        f.classList.add('sz');
        sz.appendChild(f);
      });

      const tab = document.getElementById('ptab');
      tab.innerHTML = '';
      const tf = renderFav(d, 16);
      tf.classList.add('sz');
      tab.appendChild(tf);
      tab.appendChild(document.createTextNode(' ホジョタウン'));

      const wtab = document.getElementById('pwtab');
      wtab.innerHTML = '';
      const wf = renderFav(d, 16);
      wf.classList.add('sz');
      wtab.appendChild(wf);
      const sp = document.createElement('span');
      sp.textContent = ' ホジョタウン';
      sp.style.color = '#333';
      wtab.appendChild(sp);

      document.getElementById('pn').textContent = `#${d.id} — ${d.desc}`;
    };
    grid.appendChild(item);
  }
  cat.appendChild(grid);
});
</script>
</body>
</html>
