<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ファビコン最終候補v2</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:wght@700&family=Crimson+Text:wght@700&family=Lora:wght@700&family=Merriweather:wght@900&family=DM+Serif+Display&family=Libre+Baskerville:wght@700&family=Source+Serif+4:wght@700;900&family=Noto+Serif+JP:wght@700;900&family=Josefin+Sans:wght@700&family=Montserrat:wght@800;900&family=Raleway:wght@800;900&family=Poppins:wght@800;900&family=Inter:wght@800;900&family=Outfit:wght@800&display=swap" rel="stylesheet">
<style>
body{background:#111;color:#fff;font-family:sans-serif;padding:20px}
h1{text-align:center;margin-bottom:8px}
p.sub{text-align:center;color:#888;margin-bottom:24px;font-size:13px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px}
.item{text-align:center;background:#222;border-radius:12px;padding:14px 6px;cursor:pointer;transition:transform .12s}
.item:hover{transform:scale(1.12);background:#333}
.item canvas{border-radius:8px}
.item p{font-size:10px;color:#aaa;margin-top:5px}
.item .fn{font-size:9px;color:#555}
h2{margin-top:32px;margin-bottom:12px;color:#c8a84b;border-bottom:1px solid #333;padding-bottom:6px;font-size:14px}
#pv{position:fixed;top:16px;right:16px;background:#222;padding:20px;border-radius:16px;display:none;z-index:100;min-width:200px;border:1px solid #333}
#pv canvas{border-radius:12px}
#pv .row{display:flex;gap:12px;align-items:end;margin-top:12px;justify-content:center}
#pv .row canvas{border-radius:4px}
.tab{margin-top:10px;background:#444;border-radius:6px 6px 0 0;padding:5px 10px;display:flex;align-items:center;gap:6px;font-size:12px}
.tab canvas{border-radius:3px}
.wtab{background:#f0f0f0;border-radius:0 0 6px 6px;padding:5px 10px;display:flex;align-items:center;gap:6px;font-size:12px;color:#333}
.wtab canvas{border-radius:3px}
</style>
</head>
<body>
<h1>最終候補v2 — 屋根=バー同濃度・文字はみ出しなし</h1>
<p class="sub">#33×#96ミックス。クリックでプレビュー。</p>
<div id="pv">
  <div id="pvBig"></div>
  <div class="row" id="pvSz"></div>
  <div class="tab" id="pvTab"></div>
  <div class="wtab" id="pvWt"></div>
  <p id="pvN" style="text-align:center;color:#888;margin-top:6px;font-size:11px"></p>
</div>
<div id="app"></div>

<script>
const A='#c8a84b', W='#fff';

function draw(cv, d, sz) {
  cv.width = sz; cv.height = sz;
  const c = cv.getContext('2d');
  const r = sz * 0.19;

  // 背景グラデーション
  const bg = c.createLinearGradient(0, 0, sz, sz);
  bg.addColorStop(0, '#0d3320');
  bg.addColorStop(1, '#2d8a5e');
  c.beginPath();
  c.roundRect(0, 0, sz, sz, r);
  c.fillStyle = bg;
  c.fill();

  const op = 1.0; // 完全ベタ塗り

  const thickness = sz * 0.065; // 屋根もバーも同じ太さ

  if (d.type === 'mix' || d.type === 'mix-ht') {
    // 屋根ライン
    c.strokeStyle = A;
    c.lineWidth = thickness;
    c.lineCap = 'round';
    c.beginPath();
    c.moveTo(sz*0.15, sz*0.36);
    c.lineTo(sz*0.5, sz*0.1);
    c.lineTo(sz*0.85, sz*0.36);
    c.stroke();

    // 文字
    c.fillStyle = W;
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    const fs = d.letter.length > 1 ? sz * 0.32 : sz * 0.42;
    c.font = `${d.w} ${fs}px '${d.font}', serif`;
    c.fillText(d.letter, sz*0.5, sz*0.58);

    // ゴールドバー（屋根と同じ太さ）
    c.fillStyle = A;
    const bw = sz * 0.52;
    c.beginPath();
    c.roundRect(sz*0.5 - bw/2, sz*0.8, bw, thickness, thickness/2);
    c.fill();

  } else if (d.type === 'bar') {
    // 文字
    c.fillStyle = W;
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.font = `${d.w} ${sz*0.5}px '${d.font}', serif`;
    c.fillText(d.letter, sz*0.5, sz*0.45);

    // バー
    c.fillStyle = A;
    const bw = sz*0.56;
    c.beginPath();
    c.roundRect(sz*0.5-bw/2, sz*0.76, bw, thickness, thickness/2);
    c.fill();

  } else if (d.type === 'roof') {
    // 屋根
    c.strokeStyle = A;
    c.lineWidth = thickness;
    c.lineCap = 'round';
    c.beginPath();
    c.moveTo(sz*0.12, sz*0.36);
    c.lineTo(sz*0.5, sz*0.08);
    c.lineTo(sz*0.88, sz*0.36);
    c.stroke();

    // 文字
    c.fillStyle = W;
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.font = `${d.w} ${sz*0.44}px '${d.font}', serif`;
    c.fillText(d.letter, sz*0.5, sz*0.65);
  }
}

const designs = [
// セクション1: H+屋根+バー ミックス
{id:1,font:'Playfair Display',w:900,letter:'H',desc:'Playfair Display',type:'mix'},
{id:2,font:'DM Serif Display',w:400,letter:'H',desc:'DM Serif Display',type:'mix'},
{id:3,font:'Cormorant Garamond',w:700,letter:'H',desc:'Cormorant Garamond',type:'mix'},
{id:4,font:'Lora',w:700,letter:'H',desc:'Lora',type:'mix'},
{id:5,font:'Merriweather',w:900,letter:'H',desc:'Merriweather',type:'mix'},
{id:6,font:'Libre Baskerville',w:700,letter:'H',desc:'Libre Baskerville',type:'mix'},
{id:7,font:'Source Serif 4',w:900,letter:'H',desc:'Source Serif 4',type:'mix'},
{id:8,font:'Crimson Text',w:700,letter:'H',desc:'Crimson Text',type:'mix'},
{id:9,font:'Noto Serif JP',w:900,letter:'H',desc:'Noto Serif JP',type:'mix'},
{id:10,font:'Montserrat',w:900,letter:'H',desc:'Montserrat',type:'mix'},
{id:11,font:'Raleway',w:900,letter:'H',desc:'Raleway',type:'mix'},
{id:12,font:'Poppins',w:900,letter:'H',desc:'Poppins',type:'mix'},
{id:13,font:'Inter',w:900,letter:'H',desc:'Inter',type:'mix'},
{id:14,font:'Outfit',w:800,letter:'H',desc:'Outfit',type:'mix'},
{id:15,font:'Josefin Sans',w:700,letter:'H',desc:'Josefin Sans',type:'mix'},

// セクション2: HT+屋根+バー
{id:16,font:'Playfair Display',w:900,letter:'HT',desc:'Playfair Display',type:'mix-ht'},
{id:17,font:'DM Serif Display',w:400,letter:'HT',desc:'DM Serif Display',type:'mix-ht'},
{id:18,font:'Cormorant Garamond',w:700,letter:'HT',desc:'Cormorant',type:'mix-ht'},
{id:19,font:'Lora',w:700,letter:'HT',desc:'Lora',type:'mix-ht'},
{id:20,font:'Merriweather',w:900,letter:'HT',desc:'Merriweather',type:'mix-ht'},
{id:21,font:'Source Serif 4',w:900,letter:'HT',desc:'Source Serif',type:'mix-ht'},
{id:22,font:'Montserrat',w:900,letter:'HT',desc:'Montserrat',type:'mix-ht'},
{id:23,font:'Poppins',w:900,letter:'HT',desc:'Poppins',type:'mix-ht'},
{id:24,font:'Inter',w:900,letter:'HT',desc:'Inter',type:'mix-ht'},
{id:25,font:'Outfit',w:800,letter:'HT',desc:'Outfit',type:'mix-ht'},
{id:26,font:'Raleway',w:900,letter:'HT',desc:'Raleway',type:'mix-ht'},
{id:27,font:'Noto Serif JP',w:900,letter:'HT',desc:'Noto Serif JP',type:'mix-ht'},
{id:28,font:'Libre Baskerville',w:700,letter:'HT',desc:'Libre Baskerville',type:'mix-ht'},
{id:29,font:'Crimson Text',w:700,letter:'HT',desc:'Crimson Text',type:'mix-ht'},
{id:30,font:'Josefin Sans',w:700,letter:'HT',desc:'Josefin Sans',type:'mix-ht'},

// セクション3: H+バーのみ
{id:31,font:'Playfair Display',w:900,letter:'H',desc:'Playfair',type:'bar'},
{id:32,font:'DM Serif Display',w:400,letter:'H',desc:'DM Serif',type:'bar'},
{id:33,font:'Cormorant Garamond',w:700,letter:'H',desc:'Cormorant',type:'bar'},
{id:34,font:'Lora',w:700,letter:'H',desc:'Lora',type:'bar'},
{id:35,font:'Merriweather',w:900,letter:'H',desc:'Merriweather',type:'bar'},
{id:36,font:'Montserrat',w:900,letter:'H',desc:'Montserrat',type:'bar'},
{id:37,font:'Poppins',w:900,letter:'H',desc:'Poppins',type:'bar'},
{id:38,font:'Inter',w:900,letter:'H',desc:'Inter',type:'bar'},
{id:39,font:'Outfit',w:800,letter:'H',desc:'Outfit',type:'bar'},
{id:40,font:'Raleway',w:900,letter:'H',desc:'Raleway',type:'bar'},

// セクション4: H+屋根のみ
{id:41,font:'Playfair Display',w:900,letter:'H',desc:'Playfair',type:'roof'},
{id:42,font:'DM Serif Display',w:400,letter:'H',desc:'DM Serif',type:'roof'},
{id:43,font:'Cormorant Garamond',w:700,letter:'H',desc:'Cormorant',type:'roof'},
{id:44,font:'Montserrat',w:900,letter:'H',desc:'Montserrat',type:'roof'},
{id:45,font:'Poppins',w:900,letter:'H',desc:'Poppins',type:'roof'},
{id:46,font:'Inter',w:900,letter:'H',desc:'Inter',type:'roof'},
{id:47,font:'Outfit',w:800,letter:'H',desc:'Outfit',type:'roof'},
{id:48,font:'Source Serif 4',w:900,letter:'H',desc:'Source Serif',type:'roof'},
{id:49,font:'Lora',w:700,letter:'H',desc:'Lora',type:'roof'},
{id:50,font:'Merriweather',w:900,letter:'H',desc:'Merriweather',type:'roof'},
];

const secs = [
  {name:'🏠 H + 屋根 + バー ミックス (1-15)', s:0, e:15},
  {name:'🏠 HT + 屋根 + バー (16-30)', s:15, e:30},
  {name:'━ H + バーのみ (31-40)', s:30, e:40},
  {name:'⌂ H + 屋根のみ (41-50)', s:40, e:50},
];

const app = document.getElementById('app');

// Wait for fonts
document.fonts.ready.then(() => {
  secs.forEach(sec => {
    const h = document.createElement('h2');
    h.textContent = sec.name;
    app.appendChild(h);
    const grid = document.createElement('div');
    grid.className = 'grid';
    for(let i = sec.s; i < sec.e && i < designs.length; i++) {
      const d = designs[i];
      const item = document.createElement('div');
      item.className = 'item';
      const cv = document.createElement('canvas');
      draw(cv, d, 64);
      item.appendChild(cv);
      const p = document.createElement('p');
      p.textContent = `#${d.id}`;
      item.appendChild(p);
      const fn = document.createElement('span');
      fn.className = 'fn';
      fn.textContent = d.desc;
      fn.style.cssText = 'font-size:9px;color:#555;display:block';
      item.appendChild(fn);

      item.onclick = () => {
        const pv = document.getElementById('pv');
        pv.style.display = 'block';
        // Big
        const big = document.getElementById('pvBig');
        big.innerHTML = '';
        const bc = document.createElement('canvas');
        draw(bc, d, 128);
        big.appendChild(bc);
        // Sizes
        const sz = document.getElementById('pvSz');
        sz.innerHTML = '';
        [16,24,32,48].forEach(s => {
          const sc = document.createElement('canvas');
          draw(sc, d, s);
          sz.appendChild(sc);
        });
        // Tab dark
        const tab = document.getElementById('pvTab');
        tab.innerHTML = '';
        const tc = document.createElement('canvas');
        draw(tc, d, 16);
        tab.appendChild(tc);
        tab.appendChild(document.createTextNode(' ホジョタウン'));
        // Tab white
        const wt = document.getElementById('pvWt');
        wt.innerHTML = '';
        const wc = document.createElement('canvas');
        draw(wc, d, 16);
        wt.appendChild(wc);
        const sp = document.createElement('span');
        sp.textContent = ' ホジョタウン';
        wt.appendChild(sp);
        // Label
        document.getElementById('pvN').textContent = `#${d.id} — ${d.desc} (${d.type})`;
      };
      grid.appendChild(item);
    }
    app.appendChild(grid);
  });
});
</script>
</body>
</html>
