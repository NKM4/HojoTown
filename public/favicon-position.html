<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>#3確定 — HT位置調整</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800&display=swap" rel="stylesheet">
<style>
body{background:#111;color:#fff;font-family:sans-serif;padding:20px}
h1{text-align:center;margin-bottom:8px}
p.sub{text-align:center;color:#888;margin-bottom:24px;font-size:13px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:14px}
.item{text-align:center;background:#222;border-radius:12px;padding:14px 6px;cursor:pointer;transition:transform .12s}
.item:hover{transform:scale(1.12);background:#333}
.item canvas{border-radius:8px}
.item p{font-size:11px;color:#ccc;margin-top:6px}
.item .desc{font-size:9px;color:#555;display:block;margin-top:2px}
#pv{position:fixed;top:16px;right:16px;background:#222;padding:20px;border-radius:16px;display:none;z-index:100;min-width:240px;border:1px solid #333}
#pv canvas{border-radius:10px}
.row{display:flex;gap:14px;align-items:end;margin-top:14px;justify-content:center}
.row canvas{border-radius:3px}
.tab{margin-top:10px;background:#444;border-radius:6px 6px 0 0;padding:5px 10px;display:flex;align-items:center;gap:6px;font-size:12px}
.tab canvas{border-radius:3px}
.wtab{background:#f0f0f0;border-radius:0 0 6px 6px;padding:5px 10px;display:flex;align-items:center;gap:6px;font-size:12px;color:#333}
.wtab canvas{border-radius:3px}
</style>
</head>
<body>
<h1>#3確定ベース — HT文字の高さ調整</h1>
<p class="sub">両方stroke統一 / Outfit 800 / 文字位置を1pxずつ上に</p>
<div id="pv">
  <div id="pvB"></div>
  <div class="row" id="pvS"></div>
  <div class="tab" id="pvT"></div>
  <div class="wtab" id="pvW"></div>
  <p id="pvN" style="text-align:center;color:#888;margin-top:6px;font-size:11px"></p>
</div>
<div id="app"></div>

<script>
const A='#c8a84b', W='#fff';
const font='Outfit', w=800, letter='HT';

// 文字のY位置を 0.40 〜 0.62 まで 0.01刻み = 23パターン
const positions = [];
for (let y = 0.40; y <= 0.62; y += 0.01) {
  positions.push(Math.round(y * 100) / 100);
}

function render(yPos, sz) {
  const cv = document.createElement('canvas');
  cv.width = sz; cv.height = sz;
  const c = cv.getContext('2d');
  const rx = sz * 0.19;

  // 背景グラデ
  const bg = c.createLinearGradient(0, 0, sz, sz);
  bg.addColorStop(0, '#0d3320');
  bg.addColorStop(1, '#2d8a5e');
  c.beginPath();
  c.roundRect(0, 0, sz, sz, rx);
  c.fillStyle = bg;
  c.fill();

  const t = sz * 0.065;

  // 両方stroke（#3方式）
  c.strokeStyle = A;
  c.lineWidth = t;
  c.lineCap = 'round';

  // 屋根
  c.beginPath();
  c.moveTo(sz * 0.15, sz * 0.36);
  c.lineTo(sz * 0.5, sz * 0.1);
  c.lineTo(sz * 0.85, sz * 0.36);
  c.stroke();

  // バー
  c.beginPath();
  c.moveTo(sz * 0.24, sz * 0.83);
  c.lineTo(sz * 0.76, sz * 0.83);
  c.stroke();

  // 文字
  c.fillStyle = W;
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  const fs = sz * 0.32;
  c.font = `${w} ${fs}px '${font}', sans-serif`;
  c.fillText(letter, sz * 0.5, sz * yPos);

  return cv;
}

document.fonts.ready.then(() => {
  const app = document.getElementById('app');
  const grid = document.createElement('div');
  grid.className = 'grid';

  positions.forEach((y, i) => {
    const item = document.createElement('div');
    item.className = 'item';
    item.appendChild(render(y, 72));
    const p = document.createElement('p');
    p.textContent = `#${i + 1}`;
    item.appendChild(p);
    const desc = document.createElement('span');
    desc.className = 'desc';
    desc.textContent = `Y=${y}`;
    item.appendChild(desc);

    item.onclick = () => {
      const pv = document.getElementById('pv');
      pv.style.display = 'block';
      document.getElementById('pvB').innerHTML = '';
      document.getElementById('pvB').appendChild(render(y, 128));
      const ps = document.getElementById('pvS');
      ps.innerHTML = '';
      [16, 24, 32, 48].forEach(s => ps.appendChild(render(y, s)));
      const pt = document.getElementById('pvT');
      pt.innerHTML = '';
      pt.appendChild(render(y, 16));
      pt.appendChild(document.createTextNode(' ホジョタウン'));
      const pw = document.getElementById('pvW');
      pw.innerHTML = '';
      pw.appendChild(render(y, 16));
      const sp = document.createElement('span');
      sp.textContent = ' ホジョタウン';
      pw.appendChild(sp);
      document.getElementById('pvN').textContent = `#${i + 1} — Y=${y}`;
    };
    grid.appendChild(item);
  });

  app.appendChild(grid);
});
</script>
</body>
</html>
