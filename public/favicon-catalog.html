.item { text-align: center; background: #2a2a2a; border-radius: 12px; padding: 16px 8px; cursor: pointer; transition: transform 0.1s; }
.item:hover { transform: scale(1.1); background: #3a3a3a; }
.item svg { width: 64px; height: 64px; }
.item p { font-size: 11px; color: #aaa; margin-top: 8px; }
h2 { margin-top: 40px; margin-bottom: 16px; color: #c8a84b; border-bottom: 1px solid #333; padding-bottom: 8px; }
.preview { position: fixed; top: 20px; right: 20px; background: #333; padding: 20px; border-radius: 16px; display: none; z-index: 100; }
.preview svg { width: 128px; height: 128px; }
.preview .sizes { display: flex; gap: 12px; align-items: end; margin-top: 12px; }
.preview .sizes svg { width: 16px; height: 16px; }
.preview .sizes svg:nth-child(2) { width: 32px; height: 32px; }
.preview .sizes svg:nth-child(3) { width: 48px; height: 48px; }
</style>
