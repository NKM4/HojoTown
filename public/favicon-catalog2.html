.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 14px; }

.preview { position: fixed; top: 20px; right: 20px; background: #333; padding: 20px; border-radius: 16px; display: none; z-index: 100; }
.preview svg { width: 128px; height: 128px; }
.preview .sizes { display: flex; gap: 12px; align-items: end; margin-top: 12px; }
.preview .tab { margin-top: 12px; background: #555; border-radius: 8px 8px 0 0; padding: 6px 12px; display: flex; align-items: center; gap: 6px; font-size: 12px; }
.preview .tab svg { width: 16px; height: 16px; }
