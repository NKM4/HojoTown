<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
body{margin:0;padding:0;width:2500px;height:843px;display:flex;background:#1a5c3a;font-family:'Noto Sans JP',sans-serif;}
.panel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;border-right:2px solid rgba(255,255,255,0.15);text-decoration:none;transition:background 0.2s;}
.panel:last-child{border-right:none;}
.panel-icon{font-size:80px;margin-bottom:16px;}
.panel-title{font-size:36px;font-weight:700;margin-bottom:8px;}
.panel-sub{font-size:20px;opacity:0.7;}
.panel-1{background:linear-gradient(135deg,#0d3320,#1a6b42);}
.panel-2{background:linear-gradient(135deg,#15503a,#2d8a5e);}
.panel-3{background:linear-gradient(135deg,#1a5c3a,#3da86e);}
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="panel panel-1">
  <div class="panel-icon">💡</div>
  <div class="panel-title">補助金診断</div>
  <div class="panel-sub">30秒でわかる</div>
</div>
<div class="panel panel-2">
  <div class="panel-icon">⚖️</div>
  <div class="panel-title">自治体比較</div>
  <div class="panel-sub">どっちが手厚い？</div>
</div>
<div class="panel panel-3">
  <div class="panel-icon">🌐</div>
  <div class="panel-title">サイトを見る</div>
  <div class="panel-sub">hojotown.jp</div>
</div>
</body></html>
