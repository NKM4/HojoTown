  grid.className = 'grid';
  for (let i = c.start; i < c.end && i < all.length; i++) {
    const item = document.createElement('div');
    item.className = 'item';
    const svg = all[i].replace(/id="bg"/g, `id="b${i}"`).replace(/url\(#bg\)/g, `url(#b${i})`);
    item.innerHTML = `<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">${svg}</svg><p>#${i+1}</p>`;

      const p = document.getElementById('preview');
      p.style.display = 'block';
      const s = n => all[i].replace(/id="bg"/g, `id="p${n}"`).replace(/url\(#bg\)/g, `url(#p${n})`);

      document.getElementById('pn').textContent = `#${i+1}`;
    };
    grid.appendChild(item);
  }
  cat.appendChild(grid);
