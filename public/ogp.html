<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;900&display=swap');

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .ogp {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #0d3320 0%, #1a5c3a 60%, #1f6b44 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Subtle pattern overlay */
  .ogp::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 15% 25%, rgba(200, 168, 75, 0.08) 0%, transparent 50%),
      radial-gradient(circle at 85% 75%, rgba(200, 168, 75, 0.06) 0%, transparent 50%);
    pointer-events: none;
  }

  /* Decorative top/bottom borders */
  .border-top, .border-bottom {
    position: absolute;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, #c8a84b, transparent);
  }
  .border-top { top: 0; }
  .border-bottom { bottom: 0; }

  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  /* House + Yen icon */
  .icon-row {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 8px;
  }

  .logo-text {
    font-size: 96px;
    font-weight: 900;
    letter-spacing: 0.08em;
    line-height: 1;
  }

  .logo-text .hojo {
    color: #ffffff;
  }

  .logo-text .town {
    color: #c8a84b;
  }

  .subtitle {
    font-size: 28px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.92);
    letter-spacing: 0.06em;
    margin-top: 4px;
  }

  .stats {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(200, 168, 75, 0.35);
    border-radius: 40px;
    padding: 12px 36px;
    font-size: 22px;
    font-weight: 600;
    color: #c8a84b;
    letter-spacing: 0.04em;
    margin-top: 8px;
  }

  .stats .num {
    font-size: 28px;
    font-weight: 900;
    color: #ffffff;
  }

  .url {
    position: absolute;
    bottom: 28px;
    right: 40px;
    font-size: 20px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.5);
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<div class="ogp">
  <div class="border-top"></div>
  <div class="border-bottom"></div>

  <div class="content">
    <div class="icon-row">
      <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
        <!-- House shape -->
        <path d="M36 8L6 34h8v26h44V34h8L36 8z" fill="rgba(255,255,255,0.15)" stroke="#c8a84b" stroke-width="2.5"/>
        <!-- Yen symbol inside -->
        <text x="36" y="52" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-weight="700" font-size="28" fill="#c8a84b">&yen;</text>
      </svg>
    </div>

    <div class="logo-text">
      <span class="hojo">ホジョ</span><span class="town">タウン</span>
    </div>

    <div class="subtitle">あなたの街の"もらえるお金"、30秒で全部わかる</div>

    <div class="stats">
      <span class="num">28</span>市 <span class="num">597</span>件の補助金・助成金を掲載
    </div>
  </div>

  <div class="url">hojotown.jp</div>
</div>
</body>
</html>
