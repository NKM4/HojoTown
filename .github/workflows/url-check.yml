name: Weekly URL & Content Check

on:
  schedule:
    - cron: '0 9 * * 1'  # 毎週月曜 18:00 JST
  workflow_dispatch:

jobs:
  check-urls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check URLs and notify
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_BROKEN_URL }}
        run: |
          node scripts/check-urls.cjs > url-report.txt 2>&1 || true
          COUNT=$(grep -c "BROKEN" url-report.txt 2>/dev/null || echo 0)
          echo "Broken URLs: $COUNT"
          # BROKENリストを別ファイルに抽出
          grep "BROKEN" url-report.txt > broken-urls.txt 2>/dev/null || true
          # サマリー: ドメイン別集計
          if [ "$COUNT" -gt 0 ]; then
            echo "" >> broken-urls.txt
            echo "--- ドメイン別集計 ---" >> broken-urls.txt
            awk -F'|' '{print $2}' broken-urls.txt | sed 's/^ //' | sort | uniq -c | sort -rn >> broken-urls.txt 2>/dev/null || true
            if [ -n "$DISCORD_WEBHOOK" ]; then
              # 上位5市を通知に含める
              TOP5=$(awk -F'|' '{print $2}' broken-urls.txt | sed 's/^ //' | sort | uniq -c | sort -rn | head -5 | awk '{printf "%s(%d件) ", $2, $1}')
              curl -s -X POST "$DISCORD_WEBHOOK" -H "Content-Type: application/json" \
                -d "{\"embeds\":[{\"title\":\"⚠️ ${COUNT}件のURLリンク切れ検出\",\"description\":\"上位: ${TOP5}\\n\\nArtifactにbroken-urls.txtを保存済み\",\"color\":15158332}]}"
              echo "Discord通知送信完了"
            fi
          fi

      - name: Save broken URL report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: url-check-report
          path: |
            url-report.txt
            broken-urls.txt
          retention-days: 30

  check-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore content hashes
        uses: actions/cache@v4
        with:
          path: content-hashes.json
          key: content-hashes-${{ github.ref }}-${{ github.run_id }}
          restore-keys: |
            content-hashes-${{ github.ref }}-
            content-hashes-

      - name: Check content and notify
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_CONTENT_CHANGE }}
          LINE_PUSH_URL: ${{ secrets.LINE_PUSH_URL }}
          LINE_PUSH_SECRET: ${{ secrets.LINE_PUSH_SECRET }}
        run: |
          node scripts/check-content.cjs > content-report.txt 2>&1 || true
          COUNT=$(grep -c "CHANGED" content-report.txt || true)
          echo "Changed pages: $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            # Discord通知
            if [ -n "$DISCORD_WEBHOOK" ]; then
              curl -s -X POST "$DISCORD_WEBHOOK" -H "Content-Type: application/json" \
                -d "{\"embeds\":[{\"title\":\"📝 ${COUNT}件の公式ページ内容変更を検知\",\"description\":\"補助金情報が更新された可能性があります\",\"color\":16776960}]}"
              echo "Discord通知送信完了"
            fi
            # LINE Push通知（変更があった市の登録ユーザーに通知）
            if [ -n "$LINE_PUSH_URL" ] && [ -n "$LINE_PUSH_SECRET" ]; then
              CITIES=$(grep "CHANGED" content-report.txt | awk -F'|' '{print $2}' | sed 's/ //g' | sort -u)
              for CITY in $CITIES; do
                curl -s -X POST "$LINE_PUSH_URL" \
                  -H "Authorization: Bearer $LINE_PUSH_SECRET" \
                  -H "Content-Type: application/json" \
                  -d "{\"message\":\"📢 ${CITY}の補助金情報に更新がありました。\\n\\n最新情報はこちら:\\nhttps://hojotown.jp/\"}"
                echo "LINE Push送信: $CITY"
              done
            fi
          fi

      - name: Save content hashes
        uses: actions/cache/save@v4
        with:
          path: content-hashes.json
          key: content-hashes-${{ github.ref }}-${{ github.run_id }}

  weekly-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install GA4 dependency
        run: npm install @google-analytics/data

      - name: Check LINE Token validity
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          DISCORD_WEBHOOK_ERROR: ${{ secrets.DISCORD_WEBHOOK_ERROR }}
        run: |
          if [ -z "$LINE_CHANNEL_TOKEN" ]; then
            echo "LINE_CHANNEL_TOKEN not set, skipping"
            exit 0
          fi
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $LINE_CHANNEL_TOKEN" \
            https://api.line.me/v2/bot/info)
          echo "LINE API status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "⚠️ LINE Token is invalid or expired (HTTP $HTTP_STATUS)"
            if [ -n "$DISCORD_WEBHOOK_ERROR" ]; then
              curl -s -X POST "$DISCORD_WEBHOOK_ERROR" -H "Content-Type: application/json" \
                -d "{\"embeds\":[{\"title\":\"⚠️ LINE Token 失効警告\",\"description\":\"api.line.me/v2/bot/info が HTTP ${HTTP_STATUS} を返しました。\\nTokenを再発行してください。\",\"color\":15158332,\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}]}"
              echo "Discord警告通知送信完了"
            fi
            exit 1
          else
            echo "✅ LINE Token is valid"
          fi

      - name: Send weekly report
        env:
          WEBHOOK_ACCESS: ${{ secrets.DISCORD_WEBHOOK_ACCESS }}
          WEBHOOK_CLICKS: ${{ secrets.DISCORD_WEBHOOK_CLICKS }}
          LINE_PUSH_URL: ${{ secrets.LINE_PUSH_URL }}
          LINE_PUSH_SECRET: ${{ secrets.LINE_PUSH_SECRET }}
          GA4_SERVICE_ACCOUNT_KEY: ${{ secrets.GA4_SERVICE_ACCOUNT_KEY }}
        run: node scripts/weekly-report.cjs
