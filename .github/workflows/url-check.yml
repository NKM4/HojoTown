name: Weekly URL & Content Check

on:
  schedule:
    - cron: '0 9 * * 1'  # 毎週月曜 18:00 JST
  workflow_dispatch:

jobs:
  check-urls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check all officialUrls
        id: urlcheck
        run: |
          node scripts/check-urls.cjs > url-report.txt 2>&1
          echo "report<<EOF" >> $GITHUB_OUTPUT
          cat url-report.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create issue if broken URLs found
        if: contains(steps.urlcheck.outputs.report, 'BROKEN')
        uses: actions/github-script@v7
        env:
          URL_REPORT: ${{ steps.urlcheck.outputs.report }}
        with:
          script: |
            const report = process.env.URL_REPORT;
            const brokenLines = report.split('\n').filter(l => l.includes('BROKEN'));
            if (brokenLines.length === 0) return;
            const body = `## URL整合性チェック\n\n**${brokenLines.length}件のリンク切れ**\n\n` +
              `| 市 | URL | ステータス |\n|---|---|---|\n` +
              brokenLines.map(l => {
                const parts = l.split(' | ');
                return `| ${parts[1]} | ${parts[2]} | ${parts[0]} |`;
              }).join('\n') + `\n\n自動検出 by GitHub Actions`;
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `[自動] ${brokenLines.length}件のURLリンク切れ`,
              body, labels: ['bug', 'automated']
            });

      - name: Discord notify broken URLs
        if: contains(steps.urlcheck.outputs.report, 'BROKEN')
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_BROKEN_URL }}
          URL_REPORT: ${{ steps.urlcheck.outputs.report }}
        run: |
          COUNT=$(echo "$URL_REPORT" | grep -c BROKEN || true)
          curl -s -X POST "$WEBHOOK" -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"⚠️ ${COUNT}件のURLリンク切れ検出\",\"description\":\"GitHub Issueを確認してください\",\"color\":15158332}]}"

  check-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore content hashes
        uses: actions/cache@v4
        with:
          path: content-hashes.json
          key: content-hashes-${{ github.run_id }}
          restore-keys: content-hashes-

      - name: Check content changes
        id: contentcheck
        run: |
          node scripts/check-content.cjs > content-report.txt 2>&1
          echo "report<<EOF" >> $GITHUB_OUTPUT
          cat content-report.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Save content hashes
        uses: actions/cache/save@v4
        with:
          path: content-hashes.json
          key: content-hashes-${{ github.run_id }}

      - name: Create issue if content changed
        if: contains(steps.contentcheck.outputs.report, 'CHANGED')
        uses: actions/github-script@v7
        env:
          CONTENT_REPORT: ${{ steps.contentcheck.outputs.report }}
        with:
          script: |
            const report = process.env.CONTENT_REPORT;
            const changedLines = report.split('\n').filter(l => l.includes('CHANGED'));
            if (changedLines.length === 0) return;
            const body = `## コンテンツ変更検知\n\n**${changedLines.length}件のページ内容が変更**\n\n` +
              `これらの公式ページの内容が前回チェック時から変わっています。補助金の金額・条件が変更された可能性があります。\n\n` +
              `| 市 | URL |\n|---|---|\n` +
              changedLines.map(l => {
                const parts = l.split(' | ');
                return `| ${parts[1]} | ${parts[2]} |`;
              }).join('\n') + `\n\n自動検出 by GitHub Actions`;
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `[自動] ${changedLines.length}件の公式ページ内容変更を検知`,
              body, labels: ['review', 'automated']
            });

      - name: Discord notify content changes
        if: contains(steps.contentcheck.outputs.report, 'CHANGED')
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_CONTENT_CHANGE }}
          CONTENT_REPORT: ${{ steps.contentcheck.outputs.report }}
        run: |
          COUNT=$(echo "$CONTENT_REPORT" | grep -c CHANGED || true)
          curl -s -X POST "$WEBHOOK" -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"📝 ${COUNT}件の公式ページ内容変更を検知\",\"description\":\"補助金情報が更新された可能性があります\",\"color\":16776960}]}"
